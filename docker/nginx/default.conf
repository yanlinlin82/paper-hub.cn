# Nginx configuration for paper-hub.cn
#
# Development mode:
#   Single entry point (default port 8000) that routes:
#   - /api/, /admin/  → Django backend
#   - /static/, /media/ → Django backend (dev mode)
#   - /*             → Vite dev server (SPA with HMR)
#
# Production mode (see docker/nginx/production.conf):
#   - /static/, /media/ → served directly by nginx
#   - /api/, /admin/    → Django/gunicorn backend
#   - /*                → built SPA index.html

upstream backend {
    server backend:8000;
}

upstream frontend {
    server frontend:5173;
}

server {
    listen 80;
    server_name localhost;
    client_max_body_size 100M;

    # ── Django admin & API ──────────────────────────────────────
    # These MUST come before the catch-all / block so they
    # are never intercepted by the SPA.
    location /admin/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Static / Media ──────────────────────────────────────────
    # In dev mode, proxy to Django's runserver (which handles them).
    # In production, uncomment the alias blocks below to serve
    # them directly from the filesystem.
    location /static/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /media/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Favicon / root-level assets ─────────────────────────────
    location = /favicon.ico {
        proxy_pass http://backend;
    }

    location = /robots.txt {
        proxy_pass http://backend;
    }

    # ── SPA catch-all (including /group/xiangma/, /, etc.) ─────
    # All routes not matched above go to the React dev server.
    # The SPA handles client-side routing for /group/:groupName/...
    # This will NEVER match /api/ or /admin/ because those
    # location blocks take priority.
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support for Vite HMR
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
