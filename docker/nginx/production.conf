# Nginx production configuration for paper-hub.cn
#
# Differences from dev (default.conf):
#   1. Static/media files are served DIRECTLY by nginx
#      via alias directives (no proxy to Django).
#   2. SPA is served as pre-built static files (frontend/dist/)
#      instead of proxying to Vite dev server.
#   3. Django API/admin is proxied to gunicorn.
#
# Route isolation:
#   - /api/ and /admin/ location blocks take priority over
#     the catch-all, so they NEVER reach the SPA.
#   - /group/xiangma/ (and any other SPA route) falls through
#     to the catch-all which serves index.html.
#   - /api/group/xiangma/ would correctly 404 at Django since
#     the API has no such route — no conflict.

upstream backend {
    server 127.0.0.1:8000;  # gunicorn on localhost
}

server {
    listen 80;
    server_name paper-hub.cn;
    client_max_body_size 100M;

    # ── Django API & Admin ──────────────────────────────────────
    # These MUST come BEFORE the catch-all / block.
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Static files — served DIRECTLY by nginx ─────────────────
    # Django collects static files into STATIC_ROOT via:
    #   uv run python manage.py collectstatic --noinput
    # Nginx serves them directly, bypassing Django entirely.
    location /static/ {
        alias /var/www/paper-hub/static_root/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── Media files — served DIRECTLY by nginx ──────────────────
    location /media/ {
        alias /var/www/paper-hub/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # ── Favicon / root-level assets ─────────────────────────────
    location = /favicon.ico {
        alias /var/www/paper-hub/frontend/dist/favicon.ico;
    }

    location = /robots.txt {
        alias /var/www/paper-hub/frontend/dist/robots.txt;
    }

    # ── SPA catch-all — serve pre-built index.html ──────────────
    # All unmatched routes (/, /group/xiangma/, etc.) serve the
    # built SPA.  React Router handles client-side routing.
    root /var/www/paper-hub/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
