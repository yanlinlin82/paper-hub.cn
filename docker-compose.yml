# Docker Compose for paper-hub.cn
#
# Usage:
#   docker compose up -d                       # uses default port 8000
#   DEV_PORT=8080 docker compose up -d         # uses port 8080
#   docker compose -f docker-compose.yml up  # same as above
#
# In development, only one port (Nginx) is exposed.
# All three services (backend, frontend, nginx) communicate
# over the internal docker network — no port conflicts.

services:
  # Django backend
  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: paperhub-backend
    volumes:
      - .:/app
      - backend-static:/app/static_root
      - backend-media:/app/media
      - backend-db:/app/db
    env_file:
      - .env.docker
    environment:
      - DJANGO_ENV=development
      - DEBUG=True
      - DJANGO_ALLOWED_HOSTS=localhost,127.0.0.1,backend
    # No ports exposed to host — internal only
    command: >
      sh -c "uv run python manage.py migrate --noinput &&
             uv run python manage.py runserver 0.0.0.0:8000"
    restart: unless-stopped
    networks:
      - paperhub-network

  # React frontend (Vite dev server)
  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    container_name: paperhub-frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    # No ports exposed to host — internal only
    environment:
      - VITE_BACKEND_URL=http://backend:8000
    command: npm run dev -- --host 0.0.0.0
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - paperhub-network

  # Nginx reverse proxy — single entry point
  nginx:
    image: nginx:alpine
    container_name: paperhub-nginx
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - backend-static:/static:ro
    ports:
      - "${DEV_PORT:-8000}:80"
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    networks:
      - paperhub-network

networks:
  paperhub-network:
    driver: bridge

volumes:
  backend-static:
  backend-media:
  backend-db:
