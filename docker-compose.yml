services:
  # Django backend
  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: paperhub-backend
    volumes:
      - .:/app
      - backend-static:/app/static_root
      - backend-media:/app/media
      - backend-db:/app/db
    env_file:
      - .env.docker
    environment:
      - DJANGO_ENV=development
      - DEBUG=True
      - DJANGO_ALLOWED_HOSTS=localhost,127.0.0.1,backend
    ports:
      - "8000:8000"
    command: >
      sh -c "uv run python manage.py migrate --noinput &&
             uv run python manage.py runserver 0.0.0.0:8000"
    restart: unless-stopped
    networks:
      - paperhub-network

  # React frontend (Vite dev server)
  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    container_name: paperhub-frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_BACKEND_URL=http://backend:8000
    command: npm run dev -- --host 0.0.0.0
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - paperhub-network

  # PostgreSQL database (optional, can use SQLite for dev)
  # db:
  #   image: postgres:16-alpine
  #   container_name: paperhub-db
  #   volumes:
  #     - postgres-data:/var/lib/postgresql/data
  #   environment:
  #     - POSTGRES_DB=paperhub
  #     - POSTGRES_USER=paperhub
  #     - POSTGRES_PASSWORD=paperhub
  #   ports:
  #     - "5432:5432"
  #   restart: unless-stopped
  #   networks:
  #     - paperhub-network

  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: paperhub-nginx
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - backend-static:/static:ro
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    networks:
      - paperhub-network

networks:
  paperhub-network:
    driver: bridge

volumes:
  backend-static:
  backend-media:
  backend-db:
  postgres-data:
